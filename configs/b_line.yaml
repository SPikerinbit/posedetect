backend: full  # full|opentad
seed: 42
pseudo_root: outputs/pseudo_labels
split_name: train
train_annotation_csv: outputs/pseudo_labels/group/train_tal.csv
val_annotation_csv: outputs/pseudo_labels/group/val_tal.csv
test_annotation_csv: outputs/pseudo_labels/group/test_tal.csv
output_dir: outputs/checkpoints/b_line
checkpoint_name: best_full.pt
metrics_out: outputs/metrics/b_line_metrics.json

# full local model (complete implementation)
pose_root_ucf: data/pose
pose_root_llsp: data/pose_llsp
input_dim: 66
hidden_dim: 256
num_classes: 3
num_transformer_layers: 2
num_heads: 8
seq_len: 256
batch_size: 8
epochs: 12
lr: 0.001
weight_decay: 0.0001
reg_loss_weight: 1.0
num_workers: 0
use_data_parallel: true
gpu_ids: "0,1,2,3"

# inference decode
score_thr: 0.35
nms_iou_thr: 0.5
min_segment_frames: 4
max_segments: 200

# opentad backend command placeholders
opentad_train_cmd: "python tools/train.py configs/my_actionformer_videomae.py"
opentad_work_dir: outputs/checkpoints/b_line/opentad
